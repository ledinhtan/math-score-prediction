artifacts:
  raw_data_path: data/StudentsPerformance.csv
  raw_data_output_path: artifacts/raw_data.csv
  train_data_path: artifacts/train_dataset.csv
  test_data_path: artifacts/test_dataset.csv

model:
  directory: models
  preprocessor_file: models/preprocessor.pkl
  trained_model_file: models/model.pkl
  target_column: math_score

training:
  test_size: 0.2
  random_state: 42
  validation_split: 0.2
  optuna:
    n_trials: 100
    timeout: 600
    n_jobs: 2
    sampler: tpe
    pruner:
      enabled: true
      n_startup_trials: 5
      n_warmup_steps: 10

experiment:
  name: student-math-score
  tracking_uri: file:./mlruns

preprocessing:
  numerical_imputer_n_neighbors: 7
  categorical_imputer_strategy: most_frequent
