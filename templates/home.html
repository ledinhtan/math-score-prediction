<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
    <!-- Nhúng Bootstrap 5 từ CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .predict-card { max-width: 800px; margin: 50px auto; border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header-section { background: #4e73df; color: white; padding: 30px; border-radius: 15px 15px 0 0; text-align: center; }
        .result-section { background: #eef2ff; border-radius: 10px; padding: 20px; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="card predict-card">
        <div class="header-section">
            <h2 class="fw-bold">Student Exam Performance</h2>
            <p class="mb-0">Enter student details to predict the Math Score</p>
        </div>
        
        <div class="card-body p-4">
            <form action="{{ url_for('predict_datapoint')}}" method="post">
                <div class="row g-3">
                    <!-- Gender -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Gender</label>
                        <select class="form-select" name="gender" required>
                            <option selected disabled value="">Choose...</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                    <!-- Race/Ethnicity -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Race or Ethnicity</label>
                        <select class="form-select" name="race_ethnicity" required>
                            <option selected disabled value="">Choose Group...</option>
                            <option value="group A">Group A</option>
                            <option value="group B">Group B</option>
                            <option value="group C">Group C</option>
                            <option value="group D">Group D</option>
                            <option value="group E">Group E</option>
                        </select>
                    </div>

                    <!-- Parent Education -->
                    <div class="col-md-12">
                        <label class="form-label fw-semibold">Parental Level of Education</label>
                        <select class="form-select" name="parental_level_of_education" required>
                            <option selected disabled value="">Select Level...</option>
                            <option value="associate's degree">Associate's Degree</option>
                            <option value="bachelor's degree">Bachelor's Degree</option>
                            <option value="high school">High School</option>
                            <option value="master's degree">Master's Degree</option>
                            <option value="some college">Some College</option>
                            <option value="some high school">Some High School</option>
                        </select>
                    </div>

                    <!-- Lunch -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Lunch Type</label>
                        <select class="form-select" name="lunch" required>
                            <option selected disabled value="">Select Type...</option>
                            <option value="free/reduced">Free/Reduced</option>
                            <option value="standard">Standard</option>
                        </select>
                    </div>

                    <!-- Test Prep -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Test Preparation Course</label>
                        <select class="form-select" name="test_preparation_course" required>
                            <option selected disabled value="">Status...</option>
                            <option value="none">None</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>

                    <!-- Scores -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Reading Score (0-100)</label>
                        <input type="number" name="reading_score" class="form-control" min="0" max="100" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Writing Score (0-100)</label>
                        <input type="number" name="writing_score" class="form-control" min="0" max="100" required>
                    </div>
                </div>

                <div class="mt-4 d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Predict Maths Score</button>
                </div>
            </form>

            <!-- Kết quả dự đoán -->
            {% if results %}
            <div class="result-section">
                <h4 class="text-secondary">Predicted Score</h4>
                <h1 class="display-4 fw-bold text-primary">{{ results | round(2) }}</h1>
            </div>
            {% endif %}

        </div>
        <div class="card-footer text-center">
            <a href="/" class="text-decoration-none text-muted small">← Back to Dashboard</a>
        </div>
    </div>
</div>

</body>
</html>
